// --------------------------------------------------------
// Multi-Role Capsule (MRC)
// --------------------------------------------------------
@PART[_Knes_mrk_Pod|_Knes_mrk_Pod_Rescue]:NEEDS[Knes,FeatureHabitat]:AFTER[zzzKerbalism]
{
    @MODULE[Habitat]
    {
        %volume = 8.0
        %surface = 20.0
    }

    MODULE
    {
        name = ProcessController
        resource = _Scrubber
        title = Scrubber
        capacity = 4.0
        running = true
    }

    MODULE
    {
        name = ProcessController
        resource = _PressureControlOxygen
        title = O2 Pressure Control
        capacity = 0.2 // (14 / 70)
        running = true
    }
}

